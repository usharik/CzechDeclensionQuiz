name: UI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Appium
        uses: youngfreeFJS/setup-appium@v0.1.6
        with:
          appium-version: '3.2.0'

      - name: Install UiAutomator2 driver
        run: appium driver install uiautomator2
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
      
      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
          sdkmanager "emulator" "system-images;android-30;google_apis;arm64-v8a"
      
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --force \
            --name test_emulator \
            --package "system-images;android-30;google_apis;arm64-v8a" \
            --device "pixel_5" \
            --abi arm64-v8a
      
      - name: Grant execute permissions
        run: |
          chmod +x gradlew
          chmod +x ui-tests/*.sh

      - name: Build APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
      
      - name: Run UI Tests with Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          profile: pixel_5
          avd-name: test_emulator
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Start Appium in background
            export ANDROID_HOME=$ANDROID_HOME
            export ANDROID_SDK_ROOT=$ANDROID_HOME
            appium --log-timestamp --log-no-colors > /tmp/appium.log 2>&1 &
            APPIUM_PID=$!

            # Wait for Appium to start
            echo "Waiting for Appium to start..."
            for i in {1..30}; do
              if curl -s http://localhost:4723/status > /dev/null 2>&1; then
                echo "Appium is ready!"
                break
              fi
              sleep 1
            done

            # Wait for emulator to be ready
            adb wait-for-device
            adb shell input keyevent 82
            sleep 5

            # Run tests
            cd ui-tests
            ./run-ui-tests.sh --skip-build || true

            # Stop Appium
            kill $APPIUM_PID || true
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ui-tests/build/reports/tests/
            ui-tests/build/test-results/
            ui-tests/screenshots/
          retention-days: 30
      
      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: /tmp/appium.log
          retention-days: 7
      
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        with:
          files: ui-tests/build/test-results/test/*.xml
          check_name: UI Test Results
      
      - name: Comment test results on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = fs.readFileSync('ui-tests/build/test-results/test/TEST-com.usharik.app.UiTests.xml', 'utf8');
            const passed = (testResults.match(/failures="0"/g) || []).length > 0;
            const emoji = passed ? '✅' : '❌';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} UI Tests ${passed ? 'passed' : 'failed'}!\n\nView detailed results in the Actions tab.`
            });

