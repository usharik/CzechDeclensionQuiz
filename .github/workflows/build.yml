name: Build APKs

on:
  push:
    branches: [ main ]
    tags-ignore:
      - 'v*.*.*'  # Don't run on version tags (deploy workflow handles those)
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Copy dummy google-services.json for CI build
        run: cp utils/google-services.json.dummy app/google-services.json

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Increment minor version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VERSION=$(cat VERSION)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION file contains invalid format '$VERSION'. Expected MAJOR.MINOR (e.g. '3.55')"
            exit 1
          fi
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"
          echo "$NEW_VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          if git diff-index --quiet HEAD; then
            echo "No version change detected, skipping commit."
          else
            git commit -m "Bump version to $NEW_VERSION [skip ci]"
            git push
          fi

      - name: Create a build summary
        run: |
          echo "## Build Completed! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Download Release APK](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Retention:** 3 days" >> $GITHUB_STEP_SUMMARY
