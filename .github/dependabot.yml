# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Gradle/Java/Android dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Prague"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group updates by type
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - "minor"
          - "patch"
      google:
        patterns:
          - "com.google.*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "*junit*"
          - "*espresso*"
          - "*test*"
          - "*appium*"
        update-types:
          - "minor"
          - "patch"
      rxjava:
        patterns:
          - "io.reactivex.rxjava3:*"
        update-types:
          - "minor"
          - "patch"
      dagger:
        patterns:
          - "com.google.dagger:*"
        update-types:
          - "minor"
          - "patch"
      room:
        patterns:
          - "androidx.room:*"
        update-types:
          - "minor"
          - "patch"
      firebase:
        patterns:
          - "com.google.firebase:*"
        update-types:
          - "minor"
          - "patch"
    # Ignore specific dependencies if needed
    ignore:
      # Ignore major version updates for stable dependencies
      - dependency-name: "androidx.lifecycle:lifecycle-extensions"
        update-types: ["version-update:semver-major"]

